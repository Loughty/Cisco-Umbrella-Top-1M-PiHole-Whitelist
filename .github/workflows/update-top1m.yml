name: Update Cisco Umbrella Top-1M -> PiHole whitelist

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run update script
        run: |
          chmod +x ./scripts/update-top1m.sh
          ./scripts/update-top1m.sh

      - name: Commit and push domains.txt if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Aseguramos añadir el archivo esté donde esté (asumiendo raíz)
          git add domains.txt || true
          
          if ! git diff --staged --quiet; then
            git commit -m "Update Cisco Umbrella top-1m whitelist (automated)"
            git push
          else
            echo "No changes to commit"
          fi
